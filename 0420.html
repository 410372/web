<html>
    <head>
        <title>0420-JavaScript輸出與輸入</title>
        <style>
            /*CSS註解*/
        </style>
        <script>
            //JS單行註解
            /*JS多行註解*/
            /*window 函式
        alert("訊息");
        答案=prompt("問答");
            答案為 string 或 null
        是否=confirm("確認");
            是否為 true/false

    comsole.log("開發人員訊息")

     document.getElementById("元素id") 透過id取得網頁元素
        一般容器元素.innerHTML 元素內的網頁內容
        input元素.value

        整數=parseInt(文字) 把文字轉換成整數，如過無法轉換就回傳 NaN(Not a Number)
          */
            function sayhello(){
                name=prompt("你叫甚麼名字");
                console.log(name);
                 document.getElementById("msg").innerHTML="Hello "+name;
            }
            function calc(){
                userAns=parseInt(prompt("你認為答案為多少?"));

                n1=document.getElementById("n1").value;
                n2=document.getElementById("n2").value;
                if(isNaN(n1)) n1=0;
                n2=isNaN(n2)? 0 : n2;

                document.getElementById("ans").value="答案是"+(n1+n2);
            }
            function change(){
                document.getElementById("rgn").innerHTML=document.getElementById("rg").value;
            }
        
        </script>
    </head>
    <body>
        <button onclick="sayhello();">打招呼</button>
        <div id="msg"></div>
        <hr>
        <input type="text" id="in1"><br>
        <input type="password"><br>
        <input type="number"><br>
        <input type="date"><br>
        <input type="datetime-local"><br>
        <input type="color"><br>
        <input type="range" id="rg" value="0" oninput="change();"><span id="rgn"></span><br>
        <hr>
        <input type="number" id="n1"> + <input type="number" id="n2"> = <button onclick="calc();">?</button><br>
        <input type="number" id="ans" disabled>

    </body>
</html>
