<html>
     <head> 
         <title>0330-CSS容器大小與位置</title>
        <style>
            div{
                margin-bottom: 10px;
            }
           #d1{
            width: 0px;
            height: 0px;
            border: solid 5px black;
            border-color: red yellow blue green;
            border-width: 10px 20px 30px 40px;
           }
           #d2{
            width: 100px;
            height: 50px;
            border: solid 1px black;
            border-radius: 50%;
           }
           #d3{
            width: 400px;
            height: 400px;
            border: solid 1px black;
            position: relative;
            
           }
           #d31{
            width: 50px;
            height: 50px;
            border: solid 1px red;
            background-color: red;
            position: absolute;
            top: 0px;
            left: 0px;
            z-index: 10;


           }
           #d32{
            width: 50px;
            height: 50px;
            border: solid 1px blue;
            background-color: blue;
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 20;


           }
           #d4{
            width: 50px;
            height: 50px;
            background-color: green;
            transform: scale(2,0.5) translate(100px) rotate(15deg);
           }




           #t1{
            width: 0px;
            height: 0px;
            border: solid 5px transparent;
            border-bottom-color:green;
            border-width: 0px 15px 20px 15px;
            margin: 0 0 0 10px;
           }
           #t2{
            width: 15px;
            height: 0px;
            border: solid 13px green;
            border-color: transparent transparent green transparent;
            border-top-width: 0;
            margin: 0 0 0 5px;
           }
           #t3{
            width: 20px;
            height: 0px;
            border: solid 15px green;
            border-color: transparent transparent green transparent;
            border-top-width: 0;
            margin-bottom: 0px;
           }
           #t4{
           width: 0px;
           height: 0px;
           border: solid 5px black;
           border-color: rgb(58, 4, 4);
           border-width: 10px 9px 15px 9px;
           border-top-width: 0;
           margin: 0 0 0 16px;
           }
        </style>
     </head> 
     <body>
        <div id="d1"></div>
        <div id="d2"></div>
        <div id="d3">
            <div id="d31"></div>
            <div id="d32"></div>
        </div>
        <div id="d4"></div>

        
        <!--Xmas tree--><hr>
        <div id="t1"></div>
        <div id="t2"></div>
        <div id="t3"></div>
        <div id="t4"></div>

     </body>
</html>
